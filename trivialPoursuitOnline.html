<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial Pursuit - GitHub Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --geo: #00bcd4; --div: #e91e63; --hist: #ffeb3b;
            --art: #9c27b0; --sci: #4caf50; --spo: #ff9800;
            --bg: #f5f5f5; --board-border: #000000;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #222;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0; padding: 10px;
        }

        /* --- LÉGENDE DES COULEURS --- */
        .color-legend {
            position: fixed; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px; border-radius: 10px;
            border: 2px solid #000; font-size: 0.8em;
            display: flex; flex-direction: column; gap: 5px;
            z-index: 150;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .legend-color { width: 15px; height: 15px; border: 1px solid #000; border-radius: 3px; }

        /* --- ECRAN SELECTION (Mis à jour) --- */
        #setup-screen {
            position: fixed; inset: 0; background: #1a1a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; color: white;
        }
        .setup-card { background: #333; padding: 40px; border-radius: 20px; text-align: center; border: 3px solid gold; min-width: 320px; }
        
        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; background: gold;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1em;
        }
        .menu-btn:hover { background: #ffcc00; }

        input { padding: 12px; border-radius: 8px; border: none; margin: 10px 0; width: 90%; text-align: center; font-size: 1em; }
        .hidden { display: none !important; }

        .count-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid gold;
            background: transparent; color: white; font-size: 1.2em; cursor: pointer; margin: 5px;
        }
        .count-btn:hover { background: gold; color: black; }

        /* --- UI JOUEURS --- */
        .top-bar { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; justify-content: center; }
        .player-card {
            background: white; padding: 10px; border: 3px solid #000; border-radius: 8px;
            width: 100px; text-align: center; opacity: 0.5; transition: 0.3s;
        }
        .player-card.active { opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px gold; }
        .wedges-holder { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 5px; }
        .mini-wedge { width: 12px; height: 12px; border: 1px solid #000; border-radius: 2px; }

        /* --- LE PLATEAU --- */
        #board-container {
            position: relative; width: 650px; height: 650px;
            background: white; border-radius: 50%;
            border: 4px solid var(--board-border);
        }

        .node {
            position: absolute; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; border: 2px solid #000; z-index: 5;
        }

        .node.ring, .node.spoke { width: 45px; height: 35px; }
        .node.camembert { width: 55px; height: 55px; border-radius: 50%; border: 4px solid #000; font-weight: bold; z-index: 6; }

        #center-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; z-index: 10;
        }

        .node.highlight {
            animation: blink 0.5s infinite alternate;
            cursor: pointer; z-index: 50; border: 4px solid white !important;
        }
        @keyframes blink { 
            from { filter: brightness(1); } 
            to { filter: brightness(1.5); } 
        }

        /* --- PIONS --- */
        .pawn {
            position: absolute; width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid black; z-index: 100; transition: all 0.5s ease;
            transform: translate(-50%, -50%);
        }

        /* --- MODAL QUESTION --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 300; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; border: 5px solid #000; }
        .opt-btn { background: #f0f0f0; border: 2px solid #000; padding: 12px; margin: 5px; cursor: pointer; width: 45%; font-weight: bold; }
        .opt-btn:hover { background: #ddd; }

        .controls { margin-top: 20px; width: 100%; max-width: 400px; text-align: center; }
        .action-btn { width: 100%; padding: 15px; background: gold; border: 3px solid #000; font-size: 1.2em; font-weight: bold; cursor: pointer; border-radius: 10px; }
        .action-btn:disabled { background: #999; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="color-legend">
        <div class="legend-item"><div class="legend-color" style="background:var(--geo)"></div> Géographie</div>
        <div class="legend-item"><div class="legend-color" style="background:var(--div)"></div> Divertissement</div>
        <div class="legend-item"><div class="legend-color" style="background:var(--hist)"></div> Histoire</div>
        <div class="legend-item"><div class="legend-color" style="background:var(--art)"></div> Arts & Litt.</div>
        <div class="legend-item"><div class="legend-color" style="background:var(--sci)"></div> Sciences</div>
        <div class="legend-item"><div class="legend-color" style="background:var(--spo)"></div> Sports</div>
    </div>

    <div id="setup-screen">
        <div class="setup-card" id="menu-main">
            <h1>TRIVIAL PURSUIT</h1>
            <button class="menu-btn" onclick="showMenu('local')">JOUER EN LOCAL 🏠</button>
            <button class="menu-btn" style="background:#444; color:white; border:1px solid gold" onclick="showMenu('online')">JOUER EN LIGNE 🌐</button>
        </div>

        <div class="setup-card hidden" id="menu-local">
            <p>Nombre de joueurs :</p>
            <div id="setup-btns">
                <button class="count-btn" onclick="startGame(2)">2</button>
                <button class="count-btn" onclick="startGame(3)">3</button>
                <button class="count-btn" onclick="startGame(4)">4</button>
                <button class="count-btn" onclick="startGame(5)">5</button>
                <button class="count-btn" onclick="startGame(6)">6</button>
            </div>
            <br>
            <button onclick="showMenu('main')" style="background:none; color:white; border:none; cursor:pointer; text-decoration:underline;">Retour</button>
        </div>

        <div class="setup-card hidden" id="menu-online">
            <button class="menu-btn" onclick="createRoom()">CRÉER UN SALON</button>
            <hr style="margin:20px 0; border:0; border-top:1px solid #555;">
            <input type="text" id="input-code" placeholder="CODE DU SALON">
            <input type="text" id="input-name" placeholder="TON NOM">
            <button class="menu-btn" onclick="joinRoom()">REJOINDRE</button>
            <br>
            <button onclick="showMenu('main')" style="background:none; color:white; border:none; cursor:pointer; text-decoration:underline;">Retour</button>
        </div>

        <div class="setup-card hidden" id="menu-lobby">
            <h2 id="display-code" style="color:gold;">CODE : ----</h2>
            <div id="player-list" style="margin:20px 0; text-align:left; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px;">
                </div>
            <button id="btn-start-online" class="menu-btn hidden" onclick="startOnlineGame()">LANCER LA PARTIE</button>
            <p id="lobby-status" style="font-size:0.8em; color:#aaa;">En attente de l'hôte...</p>
        </div>
    </div>

    <div class="top-bar" id="ui-players"></div>

    <div id="board-container">
        <svg id="center-hub" viewBox="0 0 100 100">
            <path d="M50,50 L50,0 A50,50 0 0,1 93.3,25 Z" fill="var(--div)" stroke="black" />
            <path d="M50,50 L93.3,25 A50,50 0 0,1 93.3,75 Z" fill="var(--sci)" stroke="black" />
            <path d="M50,50 L93.3,75 A50,50 0 0,1 50,100 Z" fill="var(--spo)" stroke="black" />
            <path d="M50,50 L50,100 A50,50 0 0,1 6.7,75 Z" fill="var(--art)" stroke="black" />
            <path d="M50,50 L6.7,75 A50,50 0 0,1 6.7,25 Z" fill="var(--geo)" stroke="black" />
            <path d="M50,50 L6.7,25 A50,50 0 0,1 50,0 Z" fill="var(--hist)" stroke="black" />
        </svg>
        <div id="nodes-layer"></div>
        <div id="pawns-layer"></div>
    </div>

    <div class="controls">
        <button id="btn-roll" class="action-btn" onclick="rollDice()">LANCER LE DÉ 🎲</button>
        <p id="status-msg" style="color:white; margin-top:10px;"></p>
    </div>

    <div id="q-modal" class="modal">
        <div class="modal-content">
            <div id="q-cat-badge" style="display:inline-block; padding:5px 15px; border:2px solid #000; margin-bottom:10px; font-weight:bold;"></div>
            <h2 id="q-text">Chargement de la question...</h2>
            <div id="q-options"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBc0_2VgY8y5xU4Jx-h3dLz8KIWgdbvUBQ",
            authDomain: "trivial-pursuit-d9dfd.firebaseapp.com",
            databaseURL: "https://trivial-pursuit-d9dfd-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "trivial-pursuit-d9dfd",
            storageBucket: "trivial-pursuit-d9dfd.firebasestorage.app",
            messagingSenderId: "632458651337",
            appId: "1:632458651337:web:5cfca66a4822f8ecf38f18"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const githubURLs = {
            'geo': 'https://raw.githubusercontent.com/Thimeo-dev/Trivial-Pursuit/refs/heads/main/geo',
            'div': 'https://raw.githubusercontent.com/Thimeo-dev/Trivial-Pursuit/refs/heads/main/div',
            'hist': 'https://raw.githubusercontent.com/Thimeo-dev/Trivial-Pursuit/refs/heads/main/hist',
            'art': 'https://raw.githubusercontent.com/Thimeo-dev/Trivial-Pursuit/refs/heads/main/art',
            'sci': 'https://raw.githubusercontent.com/Thimeo-dev/Trivial-Pursuit/refs/heads/main/sci',
            'spo': 'https://raw.githubusercontent.com/Thimeo-dev/Trivial-Pursuit/refs/heads/main/spo'
        };

        const colorMap = {
            'geo': 'var(--geo)', 'div': 'var(--div)', 'hist': 'var(--hist)',
            'art': 'var(--art)', 'sci': 'var(--sci)', 'spo': 'var(--spo)',
            'dice': '#fff', 'hub': '#fff'
        };
        const catNames = { 'geo': 'Géographie', 'div': 'Divertissement', 'hist': 'Histoire', 'art': 'Arts & Littérature', 'sci': 'Sciences & Nature', 'spo': 'Sports & Loisirs' };
        const pattern = ['div', 'sci', 'spo', 'art', 'geo', 'hist'];
        const pColors = ['#ff4444', '#4444ff', '#44cc44', '#ffbb00', '#aa44ff', '#00cccc'];

        let nodes = {};
        let players = [];
        let turn = 0;
        let roll = 0;
        // GESTION DES QUESTIONS AMÉLIORÉE (Piles de cartes)
        let questionDecks = { geo: [], div: [], hist: [], art: [], sci: [], spo: [] };

        // Variables Multijoueur
        let isOnline = false;
        let roomCode = "";
        let myPlayerId = null;

        // --- NAVIGATION MENU ---
        function showMenu(menu) {
            document.getElementById('menu-main').classList.add('hidden');
            document.getElementById('menu-local').classList.add('hidden');
            document.getElementById('menu-online').classList.add('hidden');
            document.getElementById('menu-lobby').classList.add('hidden');
            
            if(menu === 'main') document.getElementById('menu-main').classList.remove('hidden');
            if(menu === 'local') document.getElementById('menu-local').classList.remove('hidden');
            if(menu === 'online') document.getElementById('menu-online').classList.remove('hidden');
            if(menu === 'lobby') document.getElementById('menu-lobby').classList.remove('hidden');
        }

        // --- LOGIQUE FIREBASE ---
        function createRoom() {
            roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
            myPlayerId = 0;
            const name = prompt("Ton nom :") || "Hôte";
            
            db.ref('rooms/' + roomCode).set({
                state: 'lobby',
                turn: 0,
                roll: 0,
                players: [{ name: name, pos: 'center', score: [], color: pColors[0] }]
            });
            
            setupOnlineListener();
            showMenu('lobby');
            document.getElementById('display-code').innerText = "CODE : " + roomCode;
            document.getElementById('btn-start-online').classList.remove('hidden');
        }

        function joinRoom() {
            roomCode = document.getElementById('input-code').value.toUpperCase();
            const name = document.getElementById('input-name').value || "Joueur";
            
            if(!roomCode) return alert("Code requis");

            db.ref('rooms/' + roomCode).once('value', snapshot => {
                if(!snapshot.exists()) return alert("Salon introuvable");
                const data = snapshot.val();
                if(data.state !== 'lobby') return alert("Partie déjà commencée");
                
                myPlayerId = data.players.length;
                if(myPlayerId >= 6) return alert("Salon plein");

                data.players.push({ name: name, pos: 'center', score: [], color: pColors[myPlayerId] });
                db.ref('rooms/' + roomCode + '/players').set(data.players);
                
                setupOnlineListener();
                showMenu('lobby');
                document.getElementById('display-code').innerText = "CODE : " + roomCode;
            });
        }

        function setupOnlineListener() {
            isOnline = true;
            db.ref('rooms/' + roomCode).on('value', snapshot => {
                const data = snapshot.val();
                if(!data) return;

                players = data.players;
                turn = data.turn;
                roll = data.roll || 0; // Synchronisation du dé

                if(data.state === 'lobby') {
                    document.getElementById('player-list').innerHTML = players.map(p => `<div>• ${p.name}</div>`).join('');
                } else if(data.state === 'playing') {
                    if(document.getElementById('setup-screen').style.display !== 'none') {
                        initGameBoard();
                    }
                    updateUI();

                    // Surlignage automatique si c'est notre tour et qu'on a lancé le dé
                    if (turn === myPlayerId && roll > 0) {
                        const paths = findAllPaths(players[turn].pos, roll);
                        document.querySelectorAll('.highlight').forEach(n => n.classList.remove('highlight'));
                        paths.forEach(id => {
                            const nodeEl = document.getElementById(`node-${id}`);
                            if (nodeEl) nodeEl.classList.add('highlight');
                        });
                    }
                }
            });
        }

        function startOnlineGame() {
            db.ref('rooms/' + roomCode).update({ state: 'playing' });
        }

        // --- MOTEUR DE JEU ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function fetchQuestion(catId) {
    try {
        // Si le paquet est vide (1ère fois ou épuisé), on recharge et on mélange tout
        if (questionDecks[catId].length === 0) {
            const response = await fetch(githubURLs[catId]);
            const text = await response.text();
            // On récupère les lignes valides
            let lines = text.split('\n').filter(l => l.trim() !== "" && l.includes(';'));
            
            // ON MÉLANGE LE PAQUET ENTIER (Méthode de Fisher-Yates)
            questionDecks[catId] = shuffleArray(lines);
        }

        // On tire la première carte du paquet (shift() la retire de la liste)
        const randomLine = questionDecks[catId].shift();
        
        const [q, a, ...opts] = randomLine.split(';');
        const shuffledOpts = shuffleArray([...opts]);
        
        return { q, a, o: shuffledOpts };
    } catch (e) {
        console.error("Erreur GitHub:", e);
        return { q: "Erreur de chargement", a: "", o: ["Vérifier URLs"] };
    }
}

        function createBoard() {
            const layer = document.getElementById('nodes-layer');
            const cx = 325, cy = 325, r = 285;

            for(let i=0; i<42; i++) {
                const angleDeg = i * (360/42) - 90;
                const angleRad = angleDeg * (Math.PI / 180);
                const isCam = i % 7 === 0;
                let cat = pattern[i % 6];
                if(i % 7 === 4) cat = 'dice';
                const id = `r${i}`;
                const x = cx + r * Math.cos(angleRad);
                const y = cy + r * Math.sin(angleRad);
                const el = document.createElement('div');
                el.className = `node ring ${isCam ? 'camembert' : ''}`;
                el.id = `node-${id}`;
                el.style.left = x + 'px'; el.style.top = y + 'px';
                el.style.background = colorMap[isCam ? pattern[(i/7)%6] : cat];
                el.style.transform = `translate(-50%, -50%) rotate(${angleDeg + 90}deg)`;
                if(cat === 'dice' && !isCam) el.innerHTML = "🎲";
                nodes[id] = { id, x, y, cat: isCam ? pattern[(i/7)%6] : cat, edges: [`r${(i+1)%42}`, `r${(i-1+42)%42}`], type: isCam ? 'cam' : 'ring' };
                el.onclick = () => moveHere(id);
                layer.appendChild(el);
            }

            for(let s=0; s<6; s++) {
                const angleDeg = s * 60 - 90;
                const angleRad = angleDeg * (Math.PI / 180);
                let prev = `r${s*7}`;
                for(let step=1; step<=5; step++) {
                    const dist = r - (step * (r / 6.5));
                    const id = `s${s}_${step}`;
                    const x = cx + dist * Math.cos(angleRad);
                    const y = cy + dist * Math.sin(angleRad);
                    const el = document.createElement('div');
                    el.className = `node spoke`;
                    el.id = `node-${id}`;
                    el.style.left = x + 'px'; el.style.top = y + 'px';
                    el.style.background = colorMap[pattern[(s+step)%6]];
                    el.style.transform = `translate(-50%, -50%) rotate(${s * 60}deg)`;
                    nodes[id] = { id, x, y, cat: pattern[(s+step)%6], edges: [prev], type: 'spoke' };
                    nodes[prev].edges.push(id);
                    prev = id;
                    el.onclick = () => moveHere(id);
                    layer.appendChild(el);
                }
                nodes[prev].edges.push('center');
                if(!nodes['center']) nodes['center'] = { id: 'center', x: cx, y: cy, cat: 'hub', edges: [], type: 'hub' };
                nodes['center'].edges.push(prev);
            }
        }

        function startGame(num) {
            isOnline = false;
            for(let i=0; i<num; i++) {
                players.push({ id: i, name: `JOUEUR ${i+1}`, pos: 'center', score: [], color: pColors[i] });
            }
            initGameBoard();
        }

        function initGameBoard() {
            document.getElementById('setup-screen').style.display = 'none';
            createBoard();
            const pLayer = document.getElementById('pawns-layer');
            players.forEach((p, i) => {
                const el = document.createElement('div');
                el.className = 'pawn'; el.id = `pawn-${i}`;
                el.style.background = p.color;
                pLayer.appendChild(el);
            });
            updateUI();
        }

        function rollDice() {
            if(isOnline && turn !== myPlayerId) return;
            const newRoll = Math.floor(Math.random() * 6) + 1;
            
            if (isOnline) {
                db.ref('rooms/' + roomCode).update({ roll: newRoll });
            } else {
                roll = newRoll;
                document.getElementById('btn-roll').innerText = `DÉ : ${roll}`;
                document.getElementById('btn-roll').disabled = true;
                const paths = findAllPaths(players[turn].pos, roll);
                paths.forEach(id => document.getElementById(`node-${id}`).classList.add('highlight'));
                document.getElementById('status-msg').innerText = "Où voulez-vous aller ?";
            }
        }

        function findAllPaths(startId, dist) {
            let results = new Set();
            function walk(curr, d, visited) {
                if (d === 0) { results.add(curr); return; }
                for (let neighbor of nodes[curr].edges) {
                    if (neighbor !== visited) walk(neighbor, d - 1, curr);
                }
            }
            walk(startId, dist, null);
            return Array.from(results);
        }

        function moveHere(id) {
            if(!document.getElementById(`node-${id}`).classList.contains('highlight')) return;
            document.querySelectorAll('.highlight').forEach(n => n.classList.remove('highlight'));
            players[turn].pos = id;
            
            if(isOnline) {
                db.ref('rooms/' + roomCode).update({ 
                    players: players,
                    roll: 0 // On remet le dé à 0 après le déplacement
                });
            } else {
                roll = 0;
            }

            updateUI();
            setTimeout(async () => {
                const n = nodes[id];
                if(n.cat === 'dice') {
                    alert("REJOUEZ !");
                    if (isOnline) {
                         db.ref('rooms/' + roomCode).update({ roll: 0 });
                    } else {
                        document.getElementById('btn-roll').disabled = false;
                    }
                } else if (n.cat === 'hub') {
                    if(players[turn].score.length === 6) await showQuestionModal('geo');
                    else { alert("Il vous manque des camemberts !"); nextTurn(); }
                } else {
                    await showQuestionModal(n.cat);
                }
            }, 500);
        }

        async function showQuestionModal(catId) {
            if(isOnline && turn !== myPlayerId) return;

            const modal = document.getElementById('q-modal');
            const badge = document.getElementById('q-cat-badge');
            const textEl = document.getElementById('q-text');
            const optContainer = document.getElementById('q-options');
            modal.style.display = 'flex';
            textEl.innerText = "Chargement...";
            optContainer.innerHTML = '';
            const qData = await fetchQuestion(catId);
            badge.innerText = catNames[catId].toUpperCase();
            badge.style.backgroundColor = colorMap[catId];
            textEl.innerText = qData.q;
            qData.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn'; btn.innerText = opt;
                btn.onclick = () => {
                    modal.style.display = 'none';
                    if(opt.trim() === qData.a.trim()) {
                        alert("BRAVO !");
                        const n = nodes[players[turn].pos];
                        if(n.type === 'cam' && !players[turn].score.includes(n.cat)) {
                            players[turn].score.push(n.cat);
                        }
                        if(isOnline) {
                             db.ref('rooms/' + roomCode).update({ players: players, roll: 0 });
                        } else {
                             document.getElementById('btn-roll').disabled = false;
                        }
                    } else {
                        alert("DOMMAGE... La réponse était : " + qData.a);
                        nextTurn();
                    }
                    updateUI();
                };
                optContainer.appendChild(btn);
            });
        }

        function nextTurn() {
            turn = (turn + 1) % players.length;
            if(isOnline) {
                db.ref('rooms/' + roomCode).update({ turn: turn, roll: 0 });
            } else {
                roll = 0;
                document.getElementById('btn-roll').disabled = false;
                document.getElementById('btn-roll').innerText = "LANCER LE DÉ 🎲";
                document.getElementById('status-msg').innerText = "";
                updateUI();
            }
        }

        function updateUI() {
            players.forEach((p, i) => {
                const pawn = document.getElementById(`pawn-${i}`);
                if(!pawn) return;
                const target = nodes[p.pos] || nodes['center'];
                
                const angle = (i / players.length) * Math.PI * 2;
                const offsetRadius = 10;
                const offX = Math.cos(angle) * offsetRadius;
                const offY = Math.sin(angle) * offsetRadius;

                pawn.style.left = (target.x + offX) + 'px';
                pawn.style.top = (target.y + offY) + 'px';
            });
            const bar = document.getElementById('ui-players');
            bar.innerHTML = players.map((p, i) => `
                <div class="player-card ${i===turn?'active':''}">
                    <b style="color:${p.color}">${isOnline && i === myPlayerId ? 'MOI' : (p.name || 'JOUEUR ' + (i+1))}</b>
                    <div class="wedges-holder">
                        ${pattern.map(c => `<div class="mini-wedge" style="background:${(p.score || []).includes(c)?colorMap[c]:'#eee'}"></div>`).join('')}
                    </div>
                </div>
            `).join('');

            if(isOnline) {
                const myTurn = (turn === myPlayerId);
                const btnRoll = document.getElementById('btn-roll');
                btnRoll.disabled = !myTurn || roll > 0;
                btnRoll.innerText = myTurn ? (roll > 0 ? `DÉ : ${roll}` : "LANCER LE DÉ 🎲") : "TOUR DE L'ADVERSAIRE";
                document.getElementById('status-msg').innerText = (myTurn && roll > 0) ? "Où voulez-vous aller ?" : "";
            }
        }
    </script>
</body>
</html>
